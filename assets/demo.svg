<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" role="img" aria-label="Animated loop showing the Access Lens debug toggle, outlined sidebar items, and a reasons popover.">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="60%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="cardA" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <filter id="popA">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg2)"/>

  <!-- Browser frame -->
  <g transform="translate(48,40)">
    <rect width="1104" height="520" rx="14" fill="#ffffff" filter="url(#cardA)" stroke="#e2e8f0"/>
    <rect width="1104" height="44" rx="14" fill="#f1f5f9"/>
    <rect y="30" width="1104" height="14" fill="#f1f5f9"/>
    <circle cx="22" cy="22" r="6" fill="#ef4444"/>
    <circle cx="42" cy="22" r="6" fill="#f59e0b"/>
    <circle cx="62" cy="22" r="6" fill="#10b981"/>
    <rect x="100" y="12" width="340" height="20" rx="10" fill="#e2e8f0"/>
    <text x="116" y="26" font-size="10" fill="#64748b">access-lens-demo-react.vercel.app</text>

    <!-- Debug toggle, top right of browser chrome -->
    <g transform="translate(940,11)">
      <text x="0" y="14" font-size="11" font-weight="700" fill="#475569">Debug</text>
      <g transform="translate(50,2)">
        <rect width="36" height="20" rx="10" fill="#e2e8f0">
          <animate attributeName="fill" values="#e2e8f0;#e2e8f0;#2563eb;#2563eb;#2563eb;#e2e8f0" keyTimes="0;0.10;0.18;0.80;0.90;1" dur="10s" repeatCount="indefinite"/>
        </rect>
        <circle cy="10" r="7" fill="#ffffff">
          <animate attributeName="cx" values="10;10;26;26;26;10" keyTimes="0;0.10;0.18;0.80;0.90;1" dur="10s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>

    <!-- Sidebar -->
    <g transform="translate(0,44)">
      <rect width="260" height="476" fill="#fafbfc"/>
      <rect x="260" width="1" height="476" fill="#e2e8f0"/>
      <text x="22" y="36" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="1.5">WORKSPACE · ACME</text>

      <g transform="translate(14,52)">
        <!-- Home (selected) -->
        <rect width="232" height="38" rx="9" fill="#eff6ff"/>
        <circle cx="14" cy="19" r="3" fill="#2563eb"/>
        <text x="32" y="23" font-size="13" font-weight="600" fill="#0f172a">Home</text>

        <!-- Dashboard - permission outline -->
        <g transform="translate(0,46)">
          <rect width="232" height="38" rx="9" fill="#ffffff"/>
          <rect width="232" height="38" rx="9" fill="none" stroke="#38bdf8" stroke-width="1.6" opacity="0">
            <animate attributeName="opacity" values="0;0;1;1;1;0" keyTimes="0;0.10;0.20;0.80;0.90;1" dur="10s" repeatCount="indefinite"/>
          </rect>
          <circle cx="14" cy="19" r="3" fill="#10b981"/>
          <text x="32" y="23" font-size="13" fill="#334155">Dashboard</text>
        </g>

        <!-- Billing - entitlement outline -->
        <g transform="translate(0,92)">
          <rect width="232" height="38" rx="9" fill="#ffffff"/>
          <rect width="232" height="38" rx="9" fill="none" stroke="#10b981" stroke-width="1.6" opacity="0">
            <animate attributeName="opacity" values="0;0;1;1;1;0" keyTimes="0;0.10;0.22;0.80;0.90;1" dur="10s" repeatCount="indefinite"/>
          </rect>
          <circle cx="14" cy="19" r="3" fill="#10b981"/>
          <text x="32" y="23" font-size="13" fill="#334155">Billing</text>
        </g>

        <!-- Reports - flag outline -->
        <g transform="translate(0,138)">
          <rect width="232" height="38" rx="9" fill="#ffffff"/>
          <rect width="232" height="38" rx="9" fill="none" stroke="#818cf8" stroke-width="1.6" opacity="0">
            <animate attributeName="opacity" values="0;0;1;1;1;0" keyTimes="0;0.10;0.24;0.80;0.90;1" dur="10s" repeatCount="indefinite"/>
          </rect>
          <circle cx="14" cy="19" r="3" fill="#10b981"/>
          <text x="32" y="23" font-size="13" fill="#334155">Reports</text>
        </g>

        <!-- Payouts - denied entitlement (dashed) - this is the hovered one -->
        <g transform="translate(0,184)">
          <rect width="232" height="38" rx="9" fill="#ffffff"/>
          <rect width="232" height="38" rx="9" fill="none" stroke="#f87171" stroke-width="1.6" stroke-dasharray="5 4" opacity="0">
            <animate attributeName="opacity" values="0;0;1;1;1;0" keyTimes="0;0.10;0.26;0.80;0.90;1" dur="10s" repeatCount="indefinite"/>
          </rect>
          <!-- hover halo -->
          <rect width="232" height="38" rx="9" fill="rgba(254,242,242,0.6)" opacity="0">
            <animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.10;0.35;0.40;0.90;1" dur="10s" repeatCount="indefinite"/>
          </rect>
          <circle cx="14" cy="19" r="3" fill="#ef4444"/>
          <text x="32" y="23" font-size="13" fill="#94a3b8" text-decoration="line-through">Payouts</text>
        </g>

        <!-- Risk - denied plan (dashed amber) -->
        <g transform="translate(0,230)">
          <rect width="232" height="38" rx="9" fill="#ffffff"/>
          <rect width="232" height="38" rx="9" fill="none" stroke="#fb923c" stroke-width="1.6" stroke-dasharray="5 4" opacity="0">
            <animate attributeName="opacity" values="0;0;1;1;1;0" keyTimes="0;0.10;0.28;0.80;0.90;1" dur="10s" repeatCount="indefinite"/>
          </rect>
          <circle cx="14" cy="19" r="3" fill="#ef4444"/>
          <text x="32" y="23" font-size="13" fill="#94a3b8" text-decoration="line-through">Risk settings</text>
        </g>

        <!-- Settings - solid slate -->
        <g transform="translate(0,276)">
          <rect width="232" height="38" rx="9" fill="#ffffff"/>
          <rect width="232" height="38" rx="9" fill="none" stroke="#94a3b8" stroke-width="1.6" opacity="0">
            <animate attributeName="opacity" values="0;0;1;1;1;0" keyTimes="0;0.10;0.30;0.80;0.90;1" dur="10s" repeatCount="indefinite"/>
          </rect>
          <circle cx="14" cy="19" r="3" fill="#10b981"/>
          <text x="32" y="23" font-size="13" fill="#334155">Settings</text>
        </g>
      </g>
    </g>

    <!-- Main area headline -->
    <g transform="translate(296,80)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1">DEBUG MODE
        <animate attributeName="opacity" values="0;0;1;1;1;0" keyTimes="0;0.10;0.18;0.80;0.90;1" dur="10s" repeatCount="indefinite"/>
      </text>
      <text x="0" y="32" font-size="24" font-weight="800" fill="#0f172a">Hover any outlined item</text>
      <text x="0" y="56" font-size="13" fill="#64748b">See the exact reason it's hidden. Switch tenant — every cell recomputes.</text>
    </g>

    <!-- Popover sliding in from Payouts -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.10;0.40;0.45;0.90;1" dur="10s" repeatCount="indefinite"/>
      <g transform="translate(296,170)">
        <animateTransform attributeName="transform" type="translate" values="280,180;280,170;296,170;296,170" keyTimes="0;0.40;0.50;1" dur="10s" repeatCount="indefinite"/>

        <rect width="500" height="280" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="url(#popA)"/>

        <!-- Header -->
        <g>
          <rect x="20" y="20" width="68" height="20" rx="999" fill="rgba(239,68,68,0.16)"/>
          <text x="54" y="34" font-size="9" font-weight="800" fill="#b91c1c" text-anchor="middle">CLOSED HERE</text>
          <text x="98" y="36" font-size="15" font-weight="800" fill="#0f172a">Payouts</text>
          <text x="20" y="58" font-family="ui-monospace, monospace" font-size="10" fill="#64748b">sidebar_item · sidebar.payouts</text>
        </g>

        <!-- Reasons -->
        <g transform="translate(20,76)" font-size="12">
          <g>
            <rect width="460" height="40" rx="8" fill="rgba(16,185,129,0.10)"/>
            <text x="18" y="25" font-family="ui-monospace, monospace" font-size="13" font-weight="800" fill="#047857">+</text>
            <rect x="36" y="11" width="60" height="16" rx="3" fill="rgba(56,189,248,0.18)"/>
            <text x="66" y="23" font-size="9" font-weight="800" fill="#0369a1" text-anchor="middle">PERMISSION</text>
            <text x="106" y="23" font-family="ui-monospace, monospace" font-weight="700" fill="#0f172a">payouts.manage</text>
            <text x="106" y="35" fill="#475569">Admin has payouts.manage</text>
          </g>
          <g transform="translate(0,52)">
            <rect width="460" height="40" rx="8" fill="rgba(239,68,68,0.12)"/>
            <text x="18" y="25" font-family="ui-monospace, monospace" font-size="13" font-weight="800" fill="#b91c1c">×</text>
            <rect x="36" y="11" width="60" height="16" rx="3" fill="rgba(16,185,129,0.20)"/>
            <text x="66" y="23" font-size="9" font-weight="800" fill="#047857" text-anchor="middle">ENTITLEMENT</text>
            <text x="106" y="23" font-family="ui-monospace, monospace" font-weight="700" fill="#b91c1c">payouts</text>
            <text x="106" y="35" fill="#b91c1c">Acme lacks payouts entitlement</text>
          </g>
          <g transform="translate(0,104)">
            <rect width="460" height="40" rx="8" fill="rgba(16,185,129,0.10)"/>
            <text x="18" y="25" font-family="ui-monospace, monospace" font-size="13" font-weight="800" fill="#047857">+</text>
            <rect x="36" y="11" width="40" height="16" rx="3" fill="rgba(129,140,248,0.22)"/>
            <text x="56" y="23" font-size="9" font-weight="800" fill="#4338ca" text-anchor="middle">FLAG</text>
            <text x="86" y="23" font-family="ui-monospace, monospace" font-weight="700" fill="#0f172a">payouts_killswitch</text>
            <text x="86" y="35" fill="#475569">killswitch off (passing)</text>
          </g>
          <g transform="translate(0,156)">
            <rect width="460" height="40" rx="8" fill="rgba(16,185,129,0.10)"/>
            <text x="18" y="25" font-family="ui-monospace, monospace" font-size="13" font-weight="800" fill="#047857">+</text>
            <rect x="36" y="11" width="40" height="16" rx="3" fill="rgba(251,191,36,0.22)"/>
            <text x="56" y="23" font-size="9" font-weight="800" fill="#92400e" text-anchor="middle">PLAN</text>
            <text x="86" y="23" font-family="ui-monospace, monospace" font-weight="700" fill="#0f172a">≥ growth</text>
            <text x="86" y="35" fill="#475569">Tenant on "enterprise" (passing)</text>
          </g>
        </g>
      </g>
    </g>

    <!-- Bottom-left brand chip -->
    <g transform="translate(296,476)" opacity="0.5">
      <text font-size="11" font-family="ui-monospace, monospace" fill="#94a3b8">▸ Toggle Debug · hover any outlined item · switch tenant to recompute</text>
    </g>
  </g>
</svg>
